<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Webtoon PDF Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ส่วนหัวสำหรับเลือกไฟล์ */
        #upload-section {
            padding: 40px 20px;
            text-align: center;
            background: #111;
            width: 100%;
            height: 100vh; /* ให้เต็มจอก่อนเลือกไฟล์ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #viewer-container {
            width: 100%;
            max-width: 800px;
            line-height: 0;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            display: block;
            image-rendering: -webkit-optimize-contrast;
            margin: 0;
            border: none;
        }

        .loading-text {
            display: none;
            margin-top: 20px;
            color: #00ff00;
        }

        input[type="file"] {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed #555;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="upload-section">
        <h2>เปิดไฟล์การ์ตูน PDF</h2>
        <p>เพื่อความชัดสูงสุด แนะนำไฟล์ที่ไม่บีบอัดมากครับ</p>
        <input type="file" id="pdf-upload" accept="application/pdf">
        <div id="status" class="loading-text">กำลังจัดเตรียมหน้ากระดาษ...</div>
    </div>

    <div id="viewer-container"></div>

    <script>
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const fileInput = document.getElementById('pdf-upload');
        const uploadSection = document.getElementById('upload-section');
        const container = document.getElementById('viewer-container');
        const statusText = document.getElementById('status');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // แสดงข้อความกำลังโหลด
            statusText.style.display = 'block';
            fileInput.style.display = 'none';

            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                
                // วนลูปเรนเดอร์ทุกหน้า
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    // ปรับ Scale 2.5 เพื่อความคมชัดสูง (High-DPI)
                    const viewport = page.getViewport({ scale: 2.5 }); 
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    
                    await page.render(renderContext).promise;
                    container.appendChild(canvas);

                    // อัปเดตสถานะหน้า
                    statusText.innerText = `กำลังโหลดหน้า ${pageNum} จาก ${pdf.numPages}...`;

                    // เมื่อโหลดหน้าแรกเสร็จ ให้ซ่อนเมนูเลือกไฟล์ทันทีเพื่อให้เริ่มอ่านได้เลย
                    if (pageNum === 1) {
                        uploadSection.style.display = 'none';
                    }
                }
            };
            fileReader.readAsArrayBuffer(file);
        });
    </script>
</body>
</html>
